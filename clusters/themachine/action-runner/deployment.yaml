apiVersion: apps/v1
kind: Deployment
metadata:
  name: action-runner
  namespace: action-runner
  labels:
    app.kubernetes.io/name: action-runner
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: action-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: action-runner
    spec:
      serviceAccountName: action-runner
      automountServiceAccountToken: true
      containers:
        - name: action-runner
          image: python:3.13-alpine
          command: ["python", "/app/server.py"]
          env:
            - name: ADMIN_EMAILS
              value: "mzakhar@gmail.com"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: app
              mountPath: /app/server.py
              subPath: server.py
      volumes:
        - name: app
          configMap:
            name: action-runner
