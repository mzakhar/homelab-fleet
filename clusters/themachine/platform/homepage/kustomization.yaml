apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homepage
resources:
  - namespace.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

configMapGenerator:
  - name: homepage
    files:
      - config/bookmarks.yaml
      - config/custom.css
      - config/custom.js
      - config/docker.yaml
      - config/kubernetes.yaml
      - config/proxmox.yaml
      - config/services.yaml
      - config/settings.yaml
      - config/widgets.yaml

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/name: homepage
