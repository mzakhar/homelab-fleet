apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: vs-book-app
  namespace: flux-system
spec:
  interval: 1m
  ref:
    branch: main
  url: https://github.com/mzakhar/vs-book-app
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vs-book-app
  namespace: flux-system
spec:
  interval: 10m
  path: ./k8s/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: vs-book-app
  wait: true
  timeout: 5m
