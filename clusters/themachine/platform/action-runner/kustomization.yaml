apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: action-runner

resources:
  - namespace.yaml
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

configMapGenerator:
  - name: action-runner
    files:
      - src/server.py

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/name: action-runner
