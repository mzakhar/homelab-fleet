apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true
    traefik: true

  settings.yaml: |
    title: Zakhar Home
    description: Home lab dashboard and app launcher
    theme: dark
    color: slate
    headerStyle: clean
    target: _blank
    statusStyle: dot
    useEqualHeights: true
    hideVersion: true
    instanceName: family
    disableUpdateCheck: true
    background: https://images.unsplash.com/photo-1519608487953-e999c86e7455?auto=format&fit=crop&w=2560&q=90
    cardBlur: xl
    layout:
      Hosted Apps:
        style: row
        columns: 3
      Infrastructure:
        style: row
        columns: 4
      Media:
        style: row
        columns: 5
      GitHub:
        style: row
        columns: 4
      Observability:
        style: row
        columns: 3
      Actions:
        style: row
        columns: 3
      Docs:
        style: row
        columns: 3

  services.yaml: |
    - Hosted Apps:
        - Clean Mail:
            id: cleanmail
            icon: si-gmail-#ea4335
            href: https://cleanmail.zakharhome.org
            description: AI-assisted mail workspace
            siteMonitor: https://cleanmail.zakharhome.org/gmail/health
        - Synth:
            id: synth
            icon: mdi-waveform
            href: https://synth.zakharhome.org
            description: Browser-hosted synth renderer
            siteMonitor: https://synth.zakharhome.org/healthz
        - Books:
            id: books
            icon: mdi-bookshelf
            href: https://books.zakharhome.org/books/
            description: Family book library
            siteMonitor: https://books.zakharhome.org/api/health

    - Infrastructure:
        - themachine:
            id: themachine
            icon: mdi-kubernetes
            href: http://192.168.1.3:30300/d/linux-hosts/linux-hosts
            description: k3s web-app host
            widget:
              type: prometheusmetric
              url: http://prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: CPU
                  query: 100 * (1 - avg(rate(node_cpu_seconds_total{job="linux-hosts",instance="themachine",mode="idle"}[5m])))
                  format:
                    type: percent
                - label: RAM
                  query: 100 * (1 - (node_memory_MemAvailable_bytes{job="linux-hosts",instance="themachine"} / node_memory_MemTotal_bytes{job="linux-hosts",instance="themachine"}))
                  format:
                    type: percent
                - label: Root
                  query: 100 * (1 - (node_filesystem_avail_bytes{job="linux-hosts",instance="themachine",mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{job="linux-hosts",instance="themachine",mountpoint="/",fstype!="tmpfs"}))
                  format:
                    type: percent
        - homeserver:
            id: homeserver
            icon: mdi-server
            href: http://192.168.1.3:30300/d/linux-hosts/linux-hosts
            description: Ubuntu media/NAS host
            widget:
              type: prometheusmetric
              url: http://prometheus.observability.svc.cluster.local:9090
              metrics:
                - label: CPU
                  query: 100 * (1 - avg(rate(node_cpu_seconds_total{job="linux-hosts",instance="homeserver",mode="idle"}[5m])))
                  format:
                    type: percent
                - label: RAM
                  query: 100 * (1 - (node_memory_MemAvailable_bytes{job="linux-hosts",instance="homeserver"} / node_memory_MemTotal_bytes{job="linux-hosts",instance="homeserver"}))
                  format:
                    type: percent
                - label: Root
                  query: 100 * (1 - (node_filesystem_avail_bytes{job="linux-hosts",instance="homeserver",mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{job="linux-hosts",instance="homeserver",mountpoint="/",fstype!="tmpfs"}))
                  format:
                    type: percent
        - Fleet Sync:
            id: fleet-sync
            icon: si-flux-#5468ff
            href: https://actions.zakharhome.org/flux/status
            description: Flux repo pickup and apply state
            siteMonitor: http://action-runner.action-runner.svc.cluster.local:8080/flux/health
            widget:
              type: customapi
              url: http://action-runner.action-runner.svc.cluster.local:8080/flux/status
              mappings:
                - field: repo
                  label: Repo
                - field: applied
                  label: Applied
                - field: sync
                  label: Sync
                - field: failCount
                  label: Failed
                  format: number
        - Pi-hole:
            id: pihole
            icon: pi-hole.png
            href: http://pi.hole/admin/
            description: DNS service, pending restore

    - Media:
        - Jellyfin:
            id: jellyfin
            icon: jellyfin.png
            href: http://192.168.1.2:8096
            description: Primary media server
            widget:
              type: jellyfin
              url: http://192.168.1.2:8096
              key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
              enableBlocks: true
              enableNowPlaying: true
              fields: ["movies", "series", "episodes", "songs"]
        - Plex:
            id: plex
            icon: plex.png
            href: http://192.168.1.2:32400/web
            description: Legacy media server, phasing out
            widget:
              type: plex
              url: http://192.168.1.2:32400
              key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
              fields: ["streams", "movies", "tv"]
        - moOde Audio:
            id: moode-audio
            icon: mdi-speaker
            href: http://livingroommoode.local
            description: Living room audio endpoint
        - Basement moOde:
            id: basement-moode
            icon: mdi-speaker-multiple
            href: http://basementmoode.local
            description: Basement audio endpoint
        - Console moOde:
            id: console-moode
            icon: mdi-speaker-multiple
            href: http://consolemoode.local
            description: Console audio endpoint

    - GitHub:
        - homelab-fleet:
            id: repo-homelab-fleet
            icon: si-github-#ffffff
            href: https://github.com/mzakhar/homelab-fleet
            description: GitOps source for home lab
            widget:
              type: customapi
              url: https://api.github.com/repos/mzakhar/homelab-fleet
              headers:
                Authorization: Bearer {{HOMEPAGE_VAR_GITHUB_TOKEN}}
                Accept: application/vnd.github+json
                X-GitHub-Api-Version: "2022-11-28"
                User-Agent: homepage-zakharhome
              mappings:
                - field: stargazers_count
                  label: Stars
                  format: number
                - field: open_issues_count
                  label: Issues
                  format: number
                - field: pushed_at
                  label: Pushed
                  format: relativeDate
        - Clean Mail Web:
            id: repo-clean-mail-web
            icon: si-github-#ffffff
            href: https://github.com/mzakhar/gmail-frontend-replacement
            description: Private email client repo
            widget:
              type: customapi
              url: https://api.github.com/repos/mzakhar/gmail-frontend-replacement
              headers:
                Authorization: Bearer {{HOMEPAGE_VAR_GITHUB_TOKEN}}
                Accept: application/vnd.github+json
                X-GitHub-Api-Version: "2022-11-28"
                User-Agent: homepage-zakharhome
              mappings:
                - field: stargazers_count
                  label: Stars
                  format: number
                - field: open_issues_count
                  label: Issues
                  format: number
                - field: pushed_at
                  label: Pushed
                  format: relativeDate
        - Clean Mail Android:
            id: repo-clean-mail-android
            icon: si-github-#ffffff
            href: https://github.com/mzakhar/gmail-android-frontend
            description: Private Android email client
            widget:
              type: customapi
              url: https://api.github.com/repos/mzakhar/gmail-android-frontend
              headers:
                Authorization: Bearer {{HOMEPAGE_VAR_GITHUB_TOKEN}}
                Accept: application/vnd.github+json
                X-GitHub-Api-Version: "2022-11-28"
                User-Agent: homepage-zakharhome
              mappings:
                - field: stargazers_count
                  label: Stars
                  format: number
                - field: open_issues_count
                  label: Issues
                  format: number
                - field: pushed_at
                  label: Pushed
                  format: relativeDate
        - VS Book App:
            id: repo-vs-book-app
            icon: si-github-#ffffff
            href: https://github.com/mzakhar/vs-book-app
            description: Family book library app
            widget:
              type: customapi
              url: https://api.github.com/repos/mzakhar/vs-book-app
              headers:
                Authorization: Bearer {{HOMEPAGE_VAR_GITHUB_TOKEN}}
                Accept: application/vnd.github+json
                X-GitHub-Api-Version: "2022-11-28"
                User-Agent: homepage-zakharhome
              mappings:
                - field: stargazers_count
                  label: Stars
                  format: number
                - field: open_issues_count
                  label: Issues
                  format: number
                - field: pushed_at
                  label: Pushed
                  format: relativeDate
        - Audio Tools:
            id: repo-audio-tools
            icon: si-github-#ffffff
            href: https://github.com/mzakhar/Audio-Tools
            description: Audio tools playground
            widget:
              type: customapi
              url: https://api.github.com/repos/mzakhar/Audio-Tools
              headers:
                Authorization: Bearer {{HOMEPAGE_VAR_GITHUB_TOKEN}}
                Accept: application/vnd.github+json
                X-GitHub-Api-Version: "2022-11-28"
                User-Agent: homepage-zakharhome
              mappings:
                - field: stargazers_count
                  label: Stars
                  format: number
                - field: open_issues_count
                  label: Issues
                  format: number
                - field: pushed_at
                  label: Pushed
                  format: relativeDate
        - g-api-mcp:
            id: repo-g-api-mcp
            icon: si-github-#ffffff
            href: https://github.com/mzakhar/g-api-mcp
            description: Google workspace MCP server
            widget:
              type: customapi
              url: https://api.github.com/repos/mzakhar/g-api-mcp
              headers:
                Authorization: Bearer {{HOMEPAGE_VAR_GITHUB_TOKEN}}
                Accept: application/vnd.github+json
                X-GitHub-Api-Version: "2022-11-28"
                User-Agent: homepage-zakharhome
              mappings:
                - field: stargazers_count
                  label: Stars
                  format: number
                - field: open_issues_count
                  label: Issues
                  format: number
                - field: pushed_at
                  label: Pushed
                  format: relativeDate
        - serpent-rider:
            id: repo-serpent-rider
            icon: si-github-#ffffff
            href: https://github.com/mzakhar/serpent-rider
            description: Godot side-scroller
            widget:
              type: customapi
              url: https://api.github.com/repos/mzakhar/serpent-rider
              headers:
                Authorization: Bearer {{HOMEPAGE_VAR_GITHUB_TOKEN}}
                Accept: application/vnd.github+json
                X-GitHub-Api-Version: "2022-11-28"
                User-Agent: homepage-zakharhome
              mappings:
                - field: stargazers_count
                  label: Stars
                  format: number
                - field: open_issues_count
                  label: Issues
                  format: number
                - field: pushed_at
                  label: Pushed
                  format: relativeDate
        - local-observability:
            id: repo-local-observability
            icon: si-github-#ffffff
            href: https://github.com/mzakhar/local-observability
            description: Local observability skills and stack
            widget:
              type: customapi
              url: https://api.github.com/repos/mzakhar/local-observability
              headers:
                Authorization: Bearer {{HOMEPAGE_VAR_GITHUB_TOKEN}}
                Accept: application/vnd.github+json
                X-GitHub-Api-Version: "2022-11-28"
                User-Agent: homepage-zakharhome
              mappings:
                - field: stargazers_count
                  label: Stars
                  format: number
                - field: open_issues_count
                  label: Issues
                  format: number
                - field: pushed_at
                  label: Pushed
                  format: relativeDate

    - Observability:
        - Host Metrics:
            id: host-metrics
            icon: mdi-chart-line
            href: http://192.168.1.3:30300/d/linux-hosts/linux-hosts
            description: Grafana host metrics for themachine and homeserver
        - Service Status:
            id: service-status
            icon: mdi-heart-pulse
            href: http://192.168.1.3:30081
            description: Uptime Kuma, LAN-only
            widget:
              type: uptimekuma
              url: http://uptime-kuma.observability.svc.cluster.local:3001
              slug: homelab
              fields: ["up", "down", "uptime"]
        - OpenTelemetry:
            id: opentelemetry
            icon: opentelemetry.png
            href: http://192.168.1.3:30300/explore
            description: OTLP collector and Tempo traces

    - Actions:
        - Action Runner:
            id: action-runner
            icon: mdi-lightning-bolt
            href: https://actions.zakharhome.org/
            description: Admin-only operations
        - Pod Inventory:
            id: action-pods
            icon: mdi-format-list-bulleted-square
            href: https://actions.zakharhome.org/pods
            description: Read-only pod status
        - Fleet Reconcile:
            id: action-fleet-reconcile
            icon: mdi-source-branch-sync
            href: https://actions.zakharhome.org/
            description: Confirm in action UI

    - Docs:
        - Fleet Repo:
            id: fleet-repo
            icon: si-github-#ffffff
            href: https://github.com/mzakhar/homelab-fleet
            description: k3s and Flux config
        - Flux CD:
            id: flux
            icon: si-flux-#5468ff
            href: https://fluxcd.io/flux/
            description: GitOps controller docs
        - Cloudflare Tunnel:
            id: cloudflare-tunnel
            icon: si-cloudflare-#f38020
            href: https://one.dash.cloudflare.com
            description: Tunnel and Access admin
        - Homepage:
            id: homepage-docs
            icon: homepage.png
            href: https://gethomepage.dev/
            description: Dashboard documentation
        - Cloudflare Access:
            id: cloudflare-access
            icon: si-cloudflare-#f38020
            href: https://developers.cloudflare.com/cloudflare-one/access-controls/
            description: Authn and authz front door

  bookmarks.yaml: |
    - Admin:
        - GitHub:
            - abbr: GH
              href: https://github.com/mzakhar
        - Cloudflare:
            - abbr: CF
              href: https://dash.cloudflare.com
        - Flux:
            - abbr: FX
              href: https://fluxcd.io/flux/

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: false
          cpu: true
          memory: true
          showLabel: true
          label: themachine
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - datetime:
        text_size: xl
        format:
          dateStyle: medium
          timeStyle: short
    - search:
        provider: duckduckgo
        target: _blank

  docker.yaml: ""
  proxmox.yaml: ""
  custom.js: ""
  custom.css: |
    :root {
      --glass-bg: rgba(8, 18, 28, 0.34);
      --glass-bg-strong: rgba(11, 28, 42, 0.48);
      --glass-border: rgba(190, 231, 255, 0.18);
      --glass-highlight: rgba(255, 255, 255, 0.09);
      --glow-cyan: rgba(62, 207, 238, 0.26);
      --glow-rose: rgba(239, 87, 125, 0.22);
      --text-bright: #f3fbff;
    }

    html {
      min-height: 100%;
      background: #040a10;
    }

    body {
      background-color: #071018;
      color: var(--text-bright);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(2, 8, 13, 0.18), rgba(2, 8, 13, 0.72)),
        radial-gradient(circle at 18% 14%, rgba(54, 196, 230, 0.34), transparent 28%),
        radial-gradient(circle at 82% 78%, rgba(236, 70, 118, 0.34), transparent 34%),
        radial-gradient(circle at 58% 34%, rgba(255, 184, 77, 0.12), transparent 28%);
      z-index: -1;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 78%);
    }

    #page_container,
    main {
      max-width: 1460px;
    }

    h1,
    h2,
    h3 {
      color: var(--text-bright) !important;
      letter-spacing: 0 !important;
    }

    .service-card,
    .bookmark-card,
    [class*="service"],
    [class*="bookmark"] {
      border-color: var(--glass-border) !important;
    }

    .service-card,
    .bookmark-card,
    li[class*="rounded"],
    div[class*="backdrop-blur"],
    div[class*="bg-theme"],
    a[class*="bg-theme"] {
      background:
        linear-gradient(180deg, var(--glass-highlight), var(--glass-bg)),
        linear-gradient(135deg, rgba(55, 189, 232, 0.08), rgba(234, 88, 125, 0.05)) !important;
      border: 1px solid var(--glass-border) !important;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 18px 42px rgba(0, 0, 0, 0.34),
        0 0 34px rgba(28, 143, 180, 0.08);
      backdrop-filter: blur(16px) saturate(116%) brightness(94%) !important;
      -webkit-backdrop-filter: blur(16px) saturate(116%) brightness(94%) !important;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .service-card:hover,
    .bookmark-card:hover,
    li[class*="rounded"]:hover,
    a[class*="bg-theme"]:hover {
      transform: translateY(-2px);
      border-color: rgba(204, 245, 255, 0.38) !important;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 24px 54px rgba(0, 0, 0, 0.42),
        0 0 44px rgba(55, 189, 232, 0.16);
    }

    input,
    button,
    [role="button"] {
      border-color: var(--glass-border) !important;
      background-color: rgba(8, 18, 28, 0.38) !important;
      backdrop-filter: blur(16px) saturate(120%) !important;
    }

    #cleanmail,
    #synth,
    #books,
    #themachine,
    #homeserver,
    #fleet-sync,
    #flux,
    #cloudflare-tunnel,
    #jellyfin,
    #plex,
    #moode-audio,
    #basement-moode,
    #console-moode,
    #pihole,
    #repo-homelab-fleet,
    #repo-clean-mail-web,
    #repo-clean-mail-android,
    #repo-vs-book-app,
    #repo-audio-tools,
    #repo-g-api-mcp,
    #repo-serpent-rider,
    #repo-local-observability,
    #host-metrics,
    #service-status,
    #opentelemetry,
    #action-runner,
    #action-pods,
    #action-fleet-reconcile,
    #fleet-repo,
    #homepage-docs,
    #cloudflare-access {
      position: relative;
      overflow: hidden;
    }

    #cleanmail::before,
    #synth::before,
    #books::before,
    #themachine::before,
    #homeserver::before,
    #fleet-sync::before,
    #flux::before,
    #cloudflare-tunnel::before,
    #jellyfin::before,
    #plex::before,
    #moode-audio::before,
    #basement-moode::before,
    #console-moode::before,
    #pihole::before,
    #repo-homelab-fleet::before,
    #repo-clean-mail-web::before,
    #repo-clean-mail-android::before,
    #repo-vs-book-app::before,
    #repo-audio-tools::before,
    #repo-g-api-mcp::before,
    #repo-serpent-rider::before,
    #repo-local-observability::before,
    #host-metrics::before,
    #service-status::before,
    #opentelemetry::before,
    #action-runner::before,
    #action-pods::before,
    #action-fleet-reconcile::before,
    #fleet-repo::before,
    #homepage-docs::before,
    #cloudflare-access::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.5;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 44%);
    }

    #cleanmail::after,
    #synth::after,
    #books::after,
    #themachine::after,
    #homeserver::after,
    #fleet-sync::after,
    #flux::after,
    #cloudflare-tunnel::after,
    #jellyfin::after,
    #plex::after,
    #moode-audio::after,
    #basement-moode::after,
    #console-moode::after,
    #pihole::after,
    #repo-homelab-fleet::after,
    #repo-clean-mail-web::after,
    #repo-clean-mail-android::after,
    #repo-vs-book-app::after,
    #repo-audio-tools::after,
    #repo-g-api-mcp::after,
    #repo-serpent-rider::after,
    #repo-local-observability::after,
    #host-metrics::after,
    #service-status::after,
    #opentelemetry::after,
    #action-runner::after,
    #action-pods::after,
    #action-fleet-reconcile::after,
    #fleet-repo::after,
    #homepage-docs::after,
    #cloudflare-access::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--glow-cyan), transparent, var(--glow-rose));
      opacity: 0.9;
    }

    #cleanmail { --glow-cyan: rgba(234, 67, 53, 0.34); }
    #synth { --glow-cyan: rgba(41, 182, 246, 0.36); }
    #books { --glow-cyan: rgba(245, 184, 80, 0.34); }
    #themachine { --glow-cyan: rgba(84, 104, 255, 0.34); }
    #homeserver { --glow-cyan: rgba(118, 224, 183, 0.34); }
    #fleet-sync { --glow-cyan: rgba(84, 104, 255, 0.34); }
    #fleet-sync:has([class*="red"]),
    #fleet-sync:has([class*="rose"]) {
      --glow-cyan: rgba(248, 113, 113, 0.58);
      --glow-rose: rgba(251, 113, 133, 0.52);
      border-color: rgba(248, 113, 113, 0.34) !important;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.09),
        0 18px 42px rgba(0, 0, 0, 0.34),
        0 0 34px rgba(248, 113, 113, 0.16) !important;
    }
    #fleet-sync:has([class*="red"]) div[class*="grid"] > div:nth-child(4),
    #fleet-sync:has([class*="rose"]) div[class*="grid"] > div:nth-child(4),
    #fleet-sync:has([class*="red"]) div[class*="flex"] > div[class*="rounded"]:nth-child(4),
    #fleet-sync:has([class*="rose"]) div[class*="flex"] > div[class*="rounded"]:nth-child(4) {
      background: linear-gradient(180deg, rgba(248, 113, 113, 0.18), rgba(127, 29, 29, 0.24)) !important;
      border-color: rgba(248, 113, 113, 0.46) !important;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.10), 0 0 18px rgba(248, 113, 113, 0.18) !important;
    }
    #plex { --glow-cyan: rgba(229, 160, 13, 0.34); }
    #basement-moode,
    #console-moode,
    #moode-audio { --glow-cyan: rgba(125, 211, 252, 0.34); }
    #repo-homelab-fleet,
    #repo-clean-mail-web,
    #repo-clean-mail-android,
    #repo-vs-book-app,
    #repo-audio-tools,
    #repo-g-api-mcp,
    #repo-serpent-rider,
    #repo-local-observability { --glow-cyan: rgba(255, 255, 255, 0.24); }
    #action-runner,
    #action-pods,
    #action-fleet-reconcile { --glow-cyan: rgba(248, 113, 113, 0.28); }
    #cloudflare-tunnel,
    #cloudflare-access { --glow-cyan: rgba(243, 128, 32, 0.34); }

