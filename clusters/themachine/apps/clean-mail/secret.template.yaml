# Reference only — NEVER applied by Flux (not listed in kustomization.yaml).
# Copy to secret.yaml, fill in values, apply manually on themachine.
# Never commit secret.yaml to git.
#
# P6 migration: copy every value from the live gmail-app/gmail-app-secrets.
# Do NOT regenerate TOKEN_ENCRYPTION_KEY / SESSION_SECRET_KEY — regenerating
# invalidates existing sessions and encrypted tokens at rest.
#
# Generate TOKEN_ENCRYPTION_KEY (fresh installs only):
#   python3 -c "import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
#
# LAN-only GOOGLE_REDIRECT_URI must match an authorized redirect URI in Google Cloud Console:
#   http://192.168.1.3/gmail/auth/callback
# ADMIN_EMAIL bootstraps the first admin login. For this deployment:
#   mark.zakhar@gmail.com
#
# Anthropic auth uses Workload Identity Federation — see WIF env vars in backend.yaml;
# no Anthropic secret is stored.
#
apiVersion: v1
kind: Secret
metadata:
  name: clean-mail-secrets
  namespace: clean-mail
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_REDIRECT_URI: "http://192.168.1.3/gmail/auth/callback"
  TOKEN_ENCRYPTION_KEY: ""
  SESSION_SECRET_KEY: ""
  ADMIN_EMAIL: ""
  APP_ENV: "production"
  AI_DAILY_BUDGET_USD: "1.00"
  AI_MONTHLY_BUDGET_USD: "20.00"
  DATABASE_URL: "sqlite:////data/app.db"
  CHROMA_PATH: "/data/chroma"
  FRONTEND_URL: "http://192.168.1.3/gmail"
  # Renamed repo (was mzakhar/gmail-frontend-replacement; old name redirects,
  # new name is canonical post-split).
  GITHUB_FEEDBACK_REPO: "mzakhar/CleanMail-backend"
  GITHUB_FEEDBACK_TOKEN: ""
  # Stage 7 Android remote-shadow enablement. Both must be "true" for the
  # mobile shadow's read loop: MOBILE_CLASSIFICATION_SHADOW_ENABLED gates the
  # /api/classification/v1/mobile/* surface (batchGet + corrections);
  # CLASSIFICATION_CHANGE_FEED_ENABLED gates GET /changes (the cursor delta
  # loop). Documented here so a template re-apply does not drop the live
  # runtime patch. Defaults in backend/core/config.py are both False.
  MOBILE_CLASSIFICATION_SHADOW_ENABLED: "true"
  CLASSIFICATION_CHANGE_FEED_ENABLED: "true"
  # Stage 9-forward live classification coverage.
  # LIVE_CLASSIFICATION_SYNC_ENABLED: scheduled per-account history.list
  #   reconciliation floor (Phase 1). Requires CLASSIFICATION_JOBS_ENABLED for
  #   the worker to actually classify the queued jobs.
  # GMAIL_PUBSUB_* : independent backend PULL subscriber (Phase 2) on the
  #   existing gmail-push topic (Android's Eventarc subscription untouched).
  #   GOOGLE_PUBSUB_CREDENTIALS_JSON holds the cleanmail-backend-pubsub SA key
  #   (single-line JSON). Secret — fill on apply, never commit.
  CLASSIFICATION_JOBS_ENABLED: "true"
  # Verdict latency lever: the worker polls the job queue every N seconds. With
  # the Pub/Sub puller delivering in ~1s, this interval dominates end-to-end
  # verdict latency. 10s keeps a new thread's server verdict well under the ~15s
  # mark; drop toward 5s for tighter real-time at the cost of more idle DB polls
  # (single replica, cheap). Default in config.py is 60.
  CLASSIFICATION_WORKER_INTERVAL_SECONDS: "10"
  LIVE_CLASSIFICATION_SYNC_ENABLED: "true"
  GMAIL_PUBSUB_PULL_ENABLED: "true"
  GMAIL_PUBSUB_SUBSCRIPTION: "projects/android-cleanmail/subscriptions/cleanmail-backend-classification"
  GOOGLE_PUBSUB_CREDENTIALS_JSON: ""
  # Stage 10: user-scoped users.watch renewal. Hourly singleton checks renew
  # daily and retry whenever expiration is inside 48h. This uses each
  # gmail_accounts encrypted refresh token, never the Pub/Sub service account.
  GMAIL_WATCH_RENEWAL_ENABLED: "true"
  GMAIL_WATCH_TOPIC: "projects/android-cleanmail/topics/gmail-push"
  GMAIL_WATCH_CHECK_INTERVAL_MINUTES: "60"
  # Stage 9 Phase 3. Registration and sender stay independently reversible.
  # FCM reuses the SA JSON above but builds a distinct firebase.messaging-
  # scoped credential object. FCM_PROJECT_ID is not secret. Keep both flags
  # false until the backend + Android contract and Pixel drills are ready.
  MOBILE_FCM_REGISTRATION_ENABLED: "false"
  CLASSIFICATION_READY_FCM_ENABLED: "false"
  FCM_PROJECT_ID: "android-cleanmail"
  FCM_MAX_PENDING_ACCOUNTS: "256"
  FCM_TOKEN_RETENTION_DAYS: "90"
