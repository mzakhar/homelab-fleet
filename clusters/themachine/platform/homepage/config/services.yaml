- Observability:
    - Service Status:
        id: service-status
        icon: mdi-heart-pulse
        href: http://192.168.1.3:30081
        description: Uptime Kuma, LAN-only
        widget:
          type: uptimekuma
          url: http://uptime-kuma.observability.svc.cluster.local:3001
          slug: homelab
          fields: ["up", "down", "uptime"]
    - Fleet Sync:
        id: fleet-sync
        icon: si-flux-#5468ff
        href: https://actions.zakharhome.org/flux/status
        description: Flux repo pickup and apply state
        siteMonitor: http://action-runner.action-runner.svc.cluster.local:8080/flux/health
        widget:
          type: customapi
          url: http://action-runner.action-runner.svc.cluster.local:8080/flux/status
          mappings:
            - field: repo
              label: Repo
            - field: applied
              label: Applied
            - field: sync
              label: Sync
            - field: failCount
              label: Failed
              format: number
    - Alerts:
        id: alerts
        icon: mdi-alert-circle
        href: http://192.168.1.3:30090/alerts
        description: Prometheus firing alert count
        widget:
          type: prometheusmetric
          url: http://prometheus.observability.svc.cluster.local:9090
          metrics:
            - label: Firing
              query: sum(ALERTS{alertstate="firing"}) or vector(0)
              format:
                type: number
            - label: Targets Down
              query: sum(up == 0)
              format:
                type: number
    - themachine:
        id: themachine
        icon: mdi-kubernetes
        href: http://192.168.1.3:30300/d/linux-hosts/linux-hosts
        description: k3s web-app host
        widget:
          type: prometheusmetric
          url: http://prometheus.observability.svc.cluster.local:9090
          metrics:
            - label: CPU
              query: 100 * (1 - avg(rate(node_cpu_seconds_total{job="linux-hosts",instance="themachine",mode="idle"}[5m])))
              format:
                type: percent
            - label: RAM
              query: 100 * (1 - (node_memory_MemAvailable_bytes{job="linux-hosts",instance="themachine"} / node_memory_MemTotal_bytes{job="linux-hosts",instance="themachine"}))
              format:
                type: percent
            - label: Root
              query: 100 * (1 - (node_filesystem_avail_bytes{job="linux-hosts",instance="themachine",mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{job="linux-hosts",instance="themachine",mountpoint="/",fstype!="tmpfs"}))
              format:
                type: percent
    - homeserver:
        id: homeserver
        icon: mdi-server
        href: http://192.168.1.3:30300/d/linux-hosts/linux-hosts
        description: Ubuntu media/NAS host
        widget:
          type: prometheusmetric
          url: http://prometheus.observability.svc.cluster.local:9090
          metrics:
            - label: CPU
              query: 100 * (1 - avg(rate(node_cpu_seconds_total{job="linux-hosts",instance="homeserver",mode="idle"}[5m])))
              format:
                type: percent
            - label: RAM
              query: 100 * (1 - (node_memory_MemAvailable_bytes{job="linux-hosts",instance="homeserver"} / node_memory_MemTotal_bytes{job="linux-hosts",instance="homeserver"}))
              format:
                type: percent
            - label: Root
              query: 100 * (1 - (node_filesystem_avail_bytes{job="linux-hosts",instance="homeserver",mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{job="linux-hosts",instance="homeserver",mountpoint="/",fstype!="tmpfs"}))
              format:
                type: percent
    - Cluster Pressure:
        id: cluster-pressure
        icon: mdi-gauge
        href: http://192.168.1.3:30300/d/homelab-overview/homelab-overview
        description: Kubernetes availability and restarts
        widget:
          type: prometheusmetric
          url: http://prometheus.observability.svc.cluster.local:9090
          metrics:
            - label: Deploy Down
              query: sum(kube_deployment_status_replicas_unavailable) or vector(0)
              format:
                type: number
            - label: Pending Pods
              query: sum(kube_pod_status_phase{phase="Pending"}) or vector(0)
              format:
                type: number
            - label: Restarts 1h
              query: sum(increase(kube_pod_container_status_restarts_total[1h])) or vector(0)
              format:
                type: number
    - Telemetry Intake:
        id: telemetry-intake
        icon: si-opentelemetry-#f5a800
        href: http://192.168.1.3:30300/d/telemetry-pipeline/telemetry-pipeline
        description: OTLP collector and Tempo pipeline
        widget:
          type: prometheusmetric
          url: http://prometheus.observability.svc.cluster.local:9090
          metrics:
            - label: Spans/s
              query: sum(rate(otelcol_receiver_accepted_spans[5m])) or vector(0)
              format:
                type: number
            - label: Refused/s
              query: sum(rate(otelcol_receiver_refused_spans[5m])) or vector(0)
              format:
                type: number
            - label: Export Fail/s
              query: sum(rate(otelcol_exporter_send_failed_spans[5m])) or vector(0)
              format:
                type: number

